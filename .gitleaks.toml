# Cryoss — config Gitleaks
# Étend la config par défaut avec règles spécifiques Cryoss + allowlist
# pour les exemples docs/threat-model.

[extend]
useDefault = true

[[rules]]
id = "cryoss-analyss-api-key"
description = "Clé API Analyss (heartbeat phone-home)"
regex = '''(?i)ANALYSS_API_KEY\s*=\s*['\"]?([a-zA-Z0-9_\-]{32,})'''
secretGroup = 1
keywords = ["ANALYSS_API_KEY"]

[[rules]]
id = "cryoss-rclone-crypt-password"
description = "Mot de passe rclone crypt (obscurci, mais à protéger)"
regex = '''(?i)(crypt_password|password2)\s*=\s*['\"]?([A-Za-z0-9_\-]{20,})'''
secretGroup = 2
keywords = ["crypt_password", "password2"]

[[rules]]
id = "cryoss-msmtp-password"
description = "Password msmtp en clair"
regex = '''(?im)^password\s+\S{8,}'''
keywords = ["password"]
path = '''.*msmtprc.*'''

[allowlist]
description = "Faux positifs documentés (placeholders, exemples)"
paths = [
    '''docs/.*''',
    '''.*\.md$''',
    '''.*example.*''',
    '''.*\.template$''',
]
regexes = [
    '''DS-XXXXXXXX''',
    '''<API_KEY>''',
    '''<ANALYSS_API_KEY>''',
    '''placeholder''',
    '''example\.com''',
    '''CHANGEME''',
    # serial dérivé de la MAC — pas un secret
    '''DS-[0-9A-F]{8}''',
]
